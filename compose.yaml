services:
  db:
    image: postgres:16
    container_name: dispatchlite-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dispatchlite
      POSTGRES_USER: dispatchlite
      POSTGRES_PASSWORD: dispatchlite
    ports:
      - "5432:5432"
    volumes:
      - dispatchlite_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  dispatchlite_pgdata:
